name: Rename career resource heading

on:
  push:
    paths:
      - .github/workflows/rename-career-resource-heading.yml

permissions:
  contents: write

jobs:
  update-heading:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update index heading
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = '<h4>Use fuller resources</h4>'
          new = '<h4>Explore career resources</h4>'
          if old not in text:
              raise SystemExit('Target heading not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Rename career resources heading"
          git push
